<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context-Aware Smart Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- Clean, modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Auth Section -->
        <section id="auth-section" class="card">
            <h2 id="auth-title">Welcome to Smart Assistant</h2>
            <p>Login or Register to track your sessions.</p>
            
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <!-- Optional Username for Register (Hidden by default) -->
            <div class="form-group" id="username-group" style="display: none;">
                <input type="text" id="username" placeholder="Username (For Registration)">
            </div>
            
            <div class="btn-group">
                <button id="login-btn" class="btn primary">Login</button>
                <button id="toggle-register-btn" class="btn text-btn">Need to Register?</button>
            </div>
            <p id="auth-message" class="error-msg"></p>
        </section>

        <!-- Dashboard Section (Hidden by default) -->
        <section id="dashboard-section" class="card hidden">
            <header class="dashboard-header">
                <h2 id="welcome-msg">Dashboard</h2>
                <button id="logout-btn" class="btn outline">Logout</button>
            </header>

            <div class="session-controls">
                <h3>Study Session</h3>
                <input type="text" id="goal-input" placeholder="What is your goal today? (e.g., Math Ch 4)">
                
                <div class="action-buttons">
                    <button id="start-session-btn" class="btn success">Start Session</button>
                    <button id="ping-btn" class="btn primary hidden">I'm Still Here!</button>
                    <button id="stop-session-btn" class="btn danger hidden">Stop Session</button>
                </div>
                <p id="session-message" class="status-msg"></p>
            </div>

            <div class="context-engine-panel">
                <h3>🧠 Smart Context Engine</h3>
                <div id="ai-suggestion-box" class="suggestion-box">
                    <p>Start a session to get real-time context suggestions!</p>
                </div>
            </div>
        </section>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
